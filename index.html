<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Balloon Color Planner — The Balloon Lady</title>
<style>
/* css/style.css */
:root {
  --bg:     #f8f7f5;
  --card:   #ffffff;
  --border: #e2ddd8;
  --text:   #1a1816;
  --muted:  #7a756f;
  --accent: #e8006a;
  --radius: 12px;
  --font:   'Segoe UI', system-ui, sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

header {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.logo {
  width: 30px; height: 30px; border-radius: 50%;
  background: linear-gradient(135deg, #ff69b4, var(--accent));
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 15px; flex-shrink: 0;
}
header h1  { font-size: 15px; font-weight: 600; }
header p   { font-size: 10px; color: var(--muted); }

.layout {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 0;
  height: calc(100vh - 55px);
}

/* ── Left: canvas panel ─────────────────────────────────────────── */
.canvas-panel {
  padding: 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  background: var(--card);
  border-right: 1px solid var(--border);
}

#mainCanvas {
  border-radius: 8px;
  border: 1px solid var(--border);
  cursor: crosshair;
  max-width: 100%;
  display: block;
}

#status {
  font-size: 10px;
  color: var(--muted);
  text-align: center;
}

.canvas-actions {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: center;
}
.canvas-actions button { font-size: 10px; }

/* ── Right: sidebar ─────────────────────────────────────────────── */
.sidebar {
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sb-section {
  border-bottom: 1px solid var(--border);
  padding: 10px 14px;
  flex-shrink: 0;
}

.sb-title {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--muted);
  margin-bottom: 8px;
}

/* Color slots (Rule 7: visual role indicators) */
.slots {
  display: flex;
  gap: 5px;
}
.slot {
  flex: 1;
  height: 44px;
  border-radius: 8px;
  border: 1.5px dashed var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  color: var(--muted);
  cursor: pointer;
  position: relative;
  transition: border-color .12s;
  overflow: hidden;
  padding: 2px 18px 2px 4px;
  text-align: center;
  line-height: 1.3;
}
.slot:hover   { border-color: var(--accent); }
.slot.active  { outline: 2px solid var(--accent); outline-offset: 1px; }
.slot.filled  { border-style: solid; border-width: 1.5px; }
.slot-x {
  position: absolute; top: 2px; right: 5px;
  font-size: 14px; opacity: .5; cursor: pointer; line-height: 1;
}
.slot-x:hover { opacity: 1; }

/* Role assignment buttons */
.role-btns {
  display: flex;
  gap: 4px;
  margin-top: 6px;
}
.role-btn {
  flex: 1; font-size: 9px; padding: 3px 4px;
  border-radius: 5px; border: 1px solid var(--border);
  background: var(--card); color: var(--muted); cursor: pointer;
  text-align: center; transition: all .12s;
}
.role-btn:hover { background: var(--bg); color: var(--text); }

/* Selected chips */
.chips-wrap { display: flex; flex-wrap: wrap; gap: 4px; min-height: 24px; }
.chip {
  display: flex; align-items: center; gap: 3px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 20px; padding: 2px 8px 2px 5px;
  font-size: 10px; cursor: pointer;
}
.chip:hover { border-color: #aaa; }
.chip-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; border: 1px solid rgba(0,0,0,.1); }
.none { font-size: 10px; color: var(--muted); }

/* Palette */
.palette-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 10px 14px;
}
.palette-scroll::-webkit-scrollbar { width: 3px; }
.palette-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.pal-group { margin-bottom: 10px; }

.preset-btn {
  display: block; width: 100%; text-align: left;
  background: none; border: none; padding: 0 0 4px;
  font-size: 9px; font-weight: 700; color: var(--accent);
  text-transform: uppercase; letter-spacing: .06em;
  cursor: pointer; font-family: inherit;
}
.preset-btn:hover { text-decoration: underline; color: #b8004e; }

.group-label {
  font-size: 9px; font-weight: 700; color: var(--muted);
  text-transform: uppercase; letter-spacing: .06em;
  margin-bottom: 4px;
}

.swatches { display: flex; flex-wrap: wrap; gap: 3px; }
.swatch {
  width: 20px; height: 20px; border-radius: 50%;
  cursor: pointer; border: 2px solid transparent;
  transition: transform .1s, border-color .1s; flex-shrink: 0;
}
.swatch:hover { transform: scale(1.28); }

/* Summary */
.sum-section {
  padding: 8px 14px 10px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  max-height: 160px;
  overflow-y: auto;
}
.sum-row {
  display: flex; justify-content: space-between;
  font-size: 10px; padding: 2px 0;
  border-bottom: 1px solid #f0ece8;
}

/* Actions */
.actions {
  padding: 8px 14px;
  border-top: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 5px;
  flex-shrink: 0;
}
button.action {
  font-size: 12px; padding: 7px 10px;
  border-radius: 7px; border: 1px solid var(--border);
  background: var(--card); color: var(--text);
  cursor: pointer; text-align: left; width: 100%;
  font-family: var(--font);
}
button.action:hover { background: var(--bg); }
button.action.primary {
  background: var(--text); color: #fff; border-color: var(--text);
}

</style>
</head>
<body>
<header>
  <div class="logo">🎈</div>
  <div><h1>Balloon Color Planner</h1><p>calltheballoonlady.com · West Volusia County, FL · 386-999-3996</p></div>
</header>
<div class="layout">
  <div class="canvas-panel">
    <canvas id="mainCanvas" aria-label="Balloon cluster color preview"></canvas>
    <div id="status">Loading…</div>
    <div class="canvas-actions">
      <button class="action" onclick="App.selectAll()">Select all</button>
      <button class="action" onclick="App.clearSel()">Clear selection</button>
      <button class="action" onclick="App.revert()">↺ Reset</button>
    </div>
  </div>
  <div class="sidebar">
    <div class="sb-section">
      <div class="sb-title">Your colors</div>
      <div class="slots" id="slots"></div>
      <div class="role-btns">
        <button class="role-btn" onclick="App.selectRole('large')">Large</button>
        <button class="role-btn" onclick="App.selectRole('medium')">Medium</button>
        <button class="role-btn" onclick="App.selectRole('small')">Small</button>
      </div>
    </div>
    <div class="sb-section">
      <div class="sb-title">Selected</div>
      <div class="chips-wrap" id="chips"><span class="none">Click balloons to select</span></div>
    </div>
    <div class="palette-scroll" id="palette"></div>
    <div class="sum-section">
      <div class="sb-title">Color plan</div>
      <div id="summary"></div>
    </div>
    <div class="actions">
      <button class="action primary" onclick="App.copyPlan()">Copy color plan ↗</button>
    </div>
  </div>
</div>
<script>
// js/config.js
// White-label configuration — this is the ONLY file you edit to rebrand.
// Change these values, push, and the site updates automatically.

const CONFIG = {
  // Business identity
  title:       'Balloon Color Planner',
  subtitle:    'calltheballoonlady.com · West Volusia County, FL',
  phone:       '386-999-3996',
  email:       'calltheballoonlady@gmail.com',
  location:    'De Leon Springs, FL 32130',

  // Visual accent color (hex) — drives --accent CSS variable
  accent:      '#e8006a',

  // Text appended to the copied color plan
  copyFooter:  'The Balloon Lady · calltheballoonlady.com · 386-999-3996',

  // Default preset name on load (must match a key in PRESETS)
  defaultPreset: 'Pink & Fuchsia',

  // Maximum number of color slots shown in sidebar (2 or 3)
  maxSlots: 2,
};

// Apply accent color to CSS variable at runtime
document.documentElement.style.setProperty('--accent', CONFIG.accent);

</script>

    medium: { n: 'Fashion White',     h: '#FEFEFE' },
    small:  { n: 'Metallic Gold',     h: '#C8A020' },
  },
  // Source: all-white arrangements — pearl dominant, silver accent
  'White & Cream': {
    large:  { n: 'Pearl White',      h: '#F0EBE0' },
    medium: { n: 'Fashion White',    h: '#FEFEFE' },
    small:  { n: 'Metallic Silver',  h: '#C0C0C0' },
  },
  // Source: garland chrome-purple photos — lavender dominant, white medium, silver accent
  'Purple': {
    large:  { n: 'Silk Light Amethyst', h: '#D4B8E0' },
    medium: { n: 'Pastel Matte Lilac',  h: '#C8A8D4' },
    small:  { n: 'Reflex Silver',       h: '#A8A8B8' },
  },
};

</script>
<script>
// js/recolor.js
// Rule 2: original photo is the base layer — never reconstructed from geometry
// Rule 3: recoloring engine — clip to region, preserve photo shading
// Rule 4: regions define their own path() — not circles
// Rule 6: rendering only — interaction is separate (app.js)
// Rule 13: preserves original lighting, shading, texture
//
// BOUNDARY FIX (v2):
// Previous approach: fillRect(0,0,W,H) clipped to circle → bleed where circles
// overlap in 2D even if depth-separated in the photo.
//
// Fix: composite 'color' blend into an offscreen canvas per region, then stamp
// only that clipped result onto the main canvas. The photo's dark inter-balloon
// gaps (luminance ~0) stay dark under 'color' blend — they act as a natural mask.

const Recolor = (() => {
  let _photoImg = null;

  function loadPhoto(b64) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => {
        if (img.naturalWidth === 0) reject(new Error('Image decoded to zero size'));
        _photoImg = img;
        resolve(img);
      };
      img.onerror = () => reject(new Error('Image failed to load'));
      img.src = b64;
    });
  }

  function recolor(ctx, regions, colorMap) {
    if (!_photoImg) throw new Error('Photo not loaded');

    const W = ctx.canvas.width;
    const H = ctx.canvas.height;

    // Base layer: original photo (Rule 2)
    ctx.globalCompositeOperation = 'source-over';
    ctx.globalAlpha = 1;
    ctx.drawImage(_photoImg, 0, 0, W, H);

    regions.forEach(region => {
      const color = colorMap[region.id];
      if (!color) return;

      // Offscreen canvas — isolates this region's colorized pixels
      const oc = document.createElement('canvas');
      oc.width = W;
      oc.height = H;
      const oc_ctx = oc.getContext('2d');

      // Draw photo into offscreen
      oc_ctx.drawImage(_photoImg, 0, 0, W, H);

      oc_ctx.save();
      oc_ctx.beginPath();
      region.path(oc_ctx);
      oc_ctx.clip();

      // 'color' blend: shifts hue, preserves luminance — dark gaps stay dark (Rule 13)
      oc_ctx.globalCompositeOperation = 'color';
      oc_ctx.globalAlpha = 0.88;
      oc_ctx.fillStyle = color;
      oc_ctx.fillRect(0, 0, W, H);

      // Restore shading depth (Rule 13)
      oc_ctx.globalCompositeOperation = 'multiply';
      oc_ctx.globalAlpha = 0.30;
      oc_ctx.drawImage(_photoImg, 0, 0, W, H);

      // Restore highlights (Rule 13)
      oc_ctx.globalCompositeOperation = 'screen';
      oc_ctx.globalAlpha = 0.10;
      oc_ctx.fillStyle = '#ffffff';
      oc_ctx.fillRect(0, 0, W, H);

      oc_ctx.restore();

      // Stamp offscreen result — clipped so nothing bleeds outside the region
      ctx.save();
      ctx.beginPath();
      region.path(ctx);
      ctx.clip();
      ctx.globalCompositeOperation = 'source-over';
      ctx.globalAlpha = 1;
      ctx.drawImage(oc, 0, 0);
      ctx.restore();
    });
  }

  function drawSelection(ctx, region) {
    ctx.save();
    ctx.beginPath();
    region.path(ctx);
    ctx.strokeStyle = '#e8006a';
    ctx.lineWidth = 3;
    ctx.stroke();
    ctx.globalAlpha = 0.15;
    ctx.fillStyle = '#e8006a';
    ctx.fill();
    ctx.restore();
  }

  return { loadPhoto, recolor, drawSelection };
})();

</script>
<script>
// js/interaction.js
// Rule 6: interaction layer is SEPARATE from rendering
// This file handles: clicking, selection, grouping, multi-select
// It does NOT draw anything visual — that is Recolor's job

const Interaction = (() => {
  let _regions = [];
  let _onSelect = null;
  let _canvas = null;

  function init(canvas, regions, onSelectCallback) {
    _canvas = canvas;
    _regions = regions;
    _onSelect = onSelectCallback;

    canvas.addEventListener('click', handleClick);
    canvas.style.cursor = 'crosshair';
  }

  function handleClick(e) {
    const rect = _canvas.getBoundingClientRect();
    // Scale click to canvas coordinate space
    const scaleX = _canvas.width  / rect.width;
    const scaleY = _canvas.height / rect.height;
    const x = (e.clientX - rect.left) * scaleX;
    const y = (e.clientY - rect.top)  * scaleY;

    // Hit test: find all regions containing the click point
    // Rule 4: test against actual region radius (path geometry)
    const hits = _regions.filter(r => {
      const d = Math.sqrt((x - r.cx)**2 + (y - r.cy)**2);
      return d <= r.r;
    });

    if (hits.length === 0) return;

    // If multiple overlapping, pick the one whose center is closest
    hits.sort((a, b) => {
      const da = Math.sqrt((x-a.cx)**2 + (y-a.cy)**2);
      const db = Math.sqrt((x-b.cx)**2 + (y-b.cy)**2);
      return da - db;
    });
    const hit = hits[0];

    // Shift+click = add to selection; plain click = single select
    _onSelect(hit, e.shiftKey || e.metaKey || e.ctrlKey);
  }

  // Group selection by role (Rule 7 support)
  function selectByRole(role, regions) {
    return regions.filter(r => r.role === role);
  }

  function destroy() {
    if (_canvas) _canvas.removeEventListener('click', handleClick);
  }

  return { init, selectByRole, destroy };
})();

</script>
<script>
// js/app.js
// Rule 12: full pipeline — Image → Segmentation → Regions → Interaction → Color → Recolor → Verify
// Rule 7: color assignment by role (large/medium/small), not blind alternation
// Rule 11: revert protocol — restore immediately, present, then explain
// Rule 14: one cluster, one image, 2-3 colors — expand only after correctness achieved

const App = (() => {
  // State
  const state = {
    colorMap: {},      // regionId -> hex color
    selected: new Set(),
    slots: [null, null], // up to 3 color slots
    activeSlot: 0,
  };

  let canvas, ctx;

  // Rule 9: validate bounds after any transform
  function assertBounds(regions, W, H) {
    const violations = regions.filter(r =>
      r.cx - r.r < 0 || r.cy - r.r < 0 ||
      r.cx + r.r > W || r.cy + r.r > H
    );
    if (violations.length > 0) {
      console.error('BOUND VIOLATIONS — halting render:', violations);
      throw new Error(`${violations.length} regions out of bounds`);
    }
  }

  async function init() {
    canvas = document.getElementById('mainCanvas');
    ctx = canvas.getContext('2d');
    canvas.width  = PHOTO_W;
    canvas.height = PHOTO_H;

    // Rule 10: verify photo loads
    try {
      await Recolor.loadPhoto(PHOTO_B64);
    } catch(e) {
      console.error('Photo load failed:', e);
      document.getElementById('status').textContent = 'Error: photo failed to load';
      return;
    }

    // Rule 9: validate bounds before any render
    assertBounds(REGIONS, PHOTO_W, PHOTO_H);

    // Rule 7: apply default preset (Pink & Fuchsia) by role
    applyPreset('Pink & Fuchsia');

    // Rule 6: interaction separate from rendering
    Interaction.init(canvas, REGIONS, handleSelect);

    renderPalette();
    renderSlots();
    renderSummary();
    render();
  }

  function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    // Rule 3: recolor engine handles photo base + per-region color
    Recolor.recolor(ctx, REGIONS, state.colorMap);
    // Rule 6: selection indicators drawn on top by recolor module
    state.selected.forEach(id => {
      const r = REGIONS.find(r => r.id === id);
      if (r) Recolor.drawSelection(ctx, r);
    });
  }

  function handleSelect(region, additive) {
    if (additive) {
      if (state.selected.has(region.id)) state.selected.delete(region.id);
      else state.selected.add(region.id);
    } else {
      if (state.selected.size === 1 && state.selected.has(region.id))
        state.selected.clear();
      else { state.selected.clear(); state.selected.add(region.id); }
    }
    renderChips();
    render();
  }

  // Rule 7: color assignment by role
  function applyPreset(name) {
    const preset = PRESETS[name];
    if (!preset) return;
    REGIONS.forEach(r => {
      const c = preset[r.role] || preset.large;
      state.colorMap[r.id] = c.h;
    });
    state.slots = Object.values(preset).map(c => c);
    state.selected.clear();
    renderSlots();
    renderSummary();
    render();
  }

  // Rule 7: assign chosen color to selected regions
  // If nothing selected and slot mode active, apply to all of that role
  function assignColor(hex, colorObj) {
    const slot = state.activeSlot;
    state.slots[slot] = colorObj;

    const targets = state.selected.size > 0
      ? [...state.selected]
      : REGIONS.map(r => r.id); // all

    targets.forEach(id => { state.colorMap[id] = hex; });
    state.selected.clear();

    // Advance slot after pick
    if (state.activeSlot < state.slots.length - 1) state.activeSlot++;

    renderSlots();
    renderChips();
    renderSummary();
    render();
  }

  // Rule 7: select all of a role
  function selectRole(role) {
    state.selected = new Set(REGIONS.filter(r => r.role === role).map(r => r.id));
    renderChips();
    render();
  }

  // Rule 11: revert — restore working state immediately
  function revert() {
    state.colorMap = {};
    state.selected.clear();
    state.slots = [null, null];
    state.activeSlot = 0;
    applyPreset('Pink & Fuchsia');
  }

  // ── UI renderers ──────────────────────────────────────────────────────────

  function renderPalette() {
    const el = document.getElementById('palette');
    el.innerHTML = PALETTE.map(group => {
      const hasPreset = PRESETS.hasOwnProperty(group.g);
      const label = hasPreset
        ? `<button class="preset-btn" onclick="App.applyPreset('${group.g}')">${group.g}</button>`
        : `<div class="group-label">${group.g}</div>`;
      const swatches = group.c.map(c =>
        `<div class="swatch" style="background:${c.h}" title="${c.n}"
          onclick="App.assignColor('${c.h}',${JSON.stringify(c)})"></div>`
      ).join('');
      return `<div class="pal-group">${label}<div class="swatches">${swatches}</div></div>`;
    }).join('');
  }

  function renderSlots() {
    const el = document.getElementById('slots');
    el.innerHTML = state.slots.map((c, i) => {
      const active = state.activeSlot === i ? ' active' : '';
      if (!c) return `<div class="slot empty${active}" onclick="App.setSlot(${i})">Color ${i+1}</div>`;
      const light = isLight(c.h);
      return `<div class="slot filled${active}" style="background:${c.h}" onclick="App.setSlot(${i})">
        <span style="color:${light?'#333':'#fff'}">${c.n}</span>
        <span class="slot-x" onclick="App.clearSlot(event,${i})">×</span>
      </div>`;
    }).join('');
  }

  function renderChips() {
    const el = document.getElementById('chips');
    if (!state.selected.size) { el.innerHTML = '<span class="none">Click balloons to select</span>'; return; }
    el.innerHTML = [...state.selected].sort((a,b)=>a-b).map(id => {
      const r = REGIONS.find(r => r.id === id);
      const col = state.colorMap[id] || '#ccc';
      return `<div class="chip" onclick="App.deselect(${id})">
        <span class="chip-dot" style="background:${col}"></span>#${id+1}×</div>`;
    }).join('');
  }

  function renderSummary() {
    const counts = {};
    REGIONS.forEach(r => {
      const col = state.colorMap[r.id];
      if (!col) return;
      const name = findColorName(col);
      counts[name] = (counts[name]||0) + 1;
    });
    const el = document.getElementById('summary');
    el.innerHTML = Object.entries(counts)
      .sort((a,b) => b[1]-a[1])
      .map(([n,ct]) => `<div class="sum-row"><span>${n}</span><span>${ct}</span></div>`)
      .join('');
  }

  function findColorName(hex) {
    for (const g of PALETTE) for (const c of g.c)
      if (c.h === hex) return c.n;
    return hex;
  }

  function isLight(hex) {
    const n = parseInt(hex.slice(1),16);
    const r=(n>>16)&255, g=(n>>8)&255, b=n&255;
    return (0.299*r + 0.587*g + 0.114*b) > 140;
  }

  // Public API
  return {
    init,
    applyPreset,
    assignColor,
    selectRole,
    revert,
    setSlot(i)      { state.activeSlot = i; renderSlots(); },
    clearSlot(e,i)  { e.stopPropagation(); state.slots.splice(i,1,null); state.activeSlot=i; renderSlots(); },
    deselect(id)    { state.selected.delete(id); renderChips(); render(); },
    selectAll()     { state.selected = new Set(REGIONS.map(r=>r.id)); renderChips(); render(); },
    clearSel()      { state.selected.clear(); renderChips(); render(); },
    copyPlan() {
      const counts = {};
      REGIONS.forEach(r => {
        const name = findColorName(state.colorMap[r.id]||'');
        counts[name] = (counts[name]||0)+1;
      });
      const text = ['Balloon Color Plan — calltheballoonlady.com', '']
        .concat(Object.entries(counts).sort((a,b)=>b[1]-a[1]).map(([n,ct])=>`${ct}× ${n}`))
        .join('\n');
      navigator.clipboard.writeText(text)
        .then(() => { const b=event.target; const o=b.textContent; b.textContent='✓ Copied!'; setTimeout(()=>b.textContent=o,1800); })
        .catch(() => alert(text));
    }
  };
})();

window.addEventListener('DOMContentLoaded', App.init);

</script>
