<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Balloon Color Planner — The Balloon Lady</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <div class="logo">🎈</div>
  <div>
    <h1>Balloon Color Planner</h1>
    <p>calltheballoonlady.com · West Volusia County, FL · 386-999-3996</p>
  </div>
</header>

<div class="layout">

  <!-- Left: photo canvas (Rules 2, 3, 13 — rendering only) -->
  <div class="canvas-panel">
    <canvas id="mainCanvas" aria-label="Balloon cluster color preview"></canvas>
    <div id="status">Loading…</div>
    <div class="canvas-actions">
      <button class="action" onclick="App.selectAll()">Select all</button>
      <button class="action" onclick="App.clearSel()">Clear selection</button>
      <button class="action" onclick="App.revert()">↺ Reset</button>
    </div>
  </div>

  <!-- Right: sidebar (Rule 6 — interaction only, no visual rendering) -->
  <div class="sidebar">

    <!-- Color slots (Rule 7: role-based assignment) -->
    <div class="sb-section">
      <div class="sb-title">Your colors</div>
      <div class="slots" id="slots"></div>
      <div class="role-btns">
        <button class="role-btn" onclick="App.selectRole('large')">Large</button>
        <button class="role-btn" onclick="App.selectRole('medium')">Medium</button>
        <button class="role-btn" onclick="App.selectRole('small')">Small</button>
      </div>
    </div>

    <!-- Selected balloons (Rule 6: interaction state display) -->
    <div class="sb-section">
      <div class="sb-title">Selected</div>
      <div class="chips-wrap" id="chips">
        <span class="none">Click balloons to select</span>
      </div>
    </div>

    <!-- Palette (Rule 7: preset labels clickable for role-based fill) -->
    <div class="palette-scroll" id="palette"></div>

    <!-- Summary -->
    <div class="sum-section">
      <div class="sb-title">Color plan</div>
      <div id="summary"></div>
    </div>

    <!-- Copy -->
    <div class="actions">
      <button class="action primary" onclick="App.copyPlan()">Copy color plan ↗</button>
    </div>

  </div>
</div>

<!-- Load order: config → regions (data) → palette → recolor (engine) → interaction → app (orchestrator) -->
<script src="js/config.js"></script>
<script src="js/regions.js"></script>
<script src="js/palette.js"></script>
<script src="js/recolor.js"></script>
<script src="js/interaction.js"></script>
<script src="js/app.js"></script>

</body>
</html>
