<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Balloon Planner — The Balloon Lady</title>
  <meta name="description" content="Plan your balloon arrangement with real product photos, color filtering, and arrangement selection.">

  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/fancybox/3.5.7/jquery.fancybox.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="page-shell py-4 py-lg-5">
    <div
      class="container product-page"
      id="productGalleryApp"
      data-product-title="Balloon Arrangement Planner"
      data-default-label="All Arrangements"
      data-attribute-name="Color"
    >
      <div class="row g-4 g-xl-5 align-items-start">
        <div class="col-lg-6">
          <section class="gallery-card">
            <div class="gallery-stage">
              <div class="swiper product-main-swiper js-product-main" aria-label="Balloon gallery">
                <div class="swiper-wrapper" id="mainWrapper"></div>
                <button class="swiper-button-prev" type="button" aria-label="Previous slide"></button>
                <button class="swiper-button-next" type="button" aria-label="Next slide"></button>
              </div>
            </div>

            <div class="thumbs-wrap">
              <div class="swiper product-thumbs-swiper js-product-thumbs" aria-label="Thumbnail gallery">
                <div class="swiper-wrapper" id="thumbWrapper"></div>
              </div>
            </div>
          </section>
        </div>

        <div class="col-lg-6">
          <section class="product-summary">
            <h1 class="product-title h2 fw-bold mb-3" id="productTitle">
              Balloon Arrangement Planner
            </h1>

            <p class="product-intro mb-4">
              Select a balloon arrangement and color to plan your order. Click a color to see all arrangements in that color family.
            </p>

            <div class="swatch-panel mb-4">
              <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-2">
                <div class="swatch-title fw-semibold">
                  <span id="attributeLabel">Color</span>:
                  <span id="selectedColorLabel" class="selected-color-name">All Arrangements</span>
                </div>
                <button class="btn btn-outline-secondary btn-sm" id="resetGalleryBtn" type="button">
                  Reset
                </button>
              </div>

              <div class="swatch-helper small text-secondary mb-3">
                Click a color to see all arrangements in that family.
              </div>

              <div id="swatchList" class="d-flex flex-wrap gap-2" aria-label="Color swatches"></div>
            </div>

            <div class="action-group d-flex flex-wrap gap-3">
              <button class="btn btn-brand" type="button" id="copyPlanBtn">
                📋 Copy Plan
              </button>
            </div>
          </section>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fancybox/3.5.7/jquery.fancybox.min.js"></script>
  <script src="js/gallery-data.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
