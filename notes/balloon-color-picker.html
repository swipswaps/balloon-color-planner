<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Balloon Color Picker - The Balloon Lady</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'EB Garamond', Georgia, serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      padding: 20px;
      min-height: 100vh;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
      padding: 40px;
    }
    
    h1 {
      text-align: center;
      font-size: 48px;
      margin-bottom: 10px;
      color: #2c3e50;
    }
    
    .subtitle {
      text-align: center;
      font-size: 18px;
      color: #7f8c8d;
      margin-bottom: 40px;
    }
    
    .selected-colors {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 30px;
      min-height: 80px;
    }
    
    .selected-label {
      font-size: 16px;
      font-weight: 600;
      color: #495057;
      margin-bottom: 10px;
    }
    
    .selected-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    
    .selected-chip {
      background: white;
      border: 2px solid #dee2e6;
      border-radius: 20px;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .selected-chip:hover {
      background: #ffe0e0;
      border-color: #ff6b6b;
    }
    
    .selected-chip .remove {
      color: #ff6b6b;
      font-weight: bold;
      font-size: 18px;
    }
    
    .color-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .color-card {
      background: white;
      border: 3px solid transparent;
      border-radius: 12px;
      padding: 12px;
      cursor: pointer;
      transition: all 0.3s;
      text-align: center;
    }
    
    .color-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      border-color: #3498db;
    }
    
    .color-card.selected {
      border-color: #27ae60;
      background: #e8f8f0;
    }
    
    .color-thumbnail {
      width: 100%;
      height: 140px;
      object-fit: contain;
      border-radius: 8px;
      margin-bottom: 10px;
    }
    
    .color-name {
      font-size: 14px;
      font-weight: 600;
      color: #2c3e50;
      line-height: 1.3;
    }
    
    .actions {
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
    }
    
    button {
      padding: 12px 32px;
      font-size: 16px;
      font-family: 'EB Garamond', Georgia, serif;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 600;
    }
    
    .btn-copy {
      background: #3498db;
      color: white;
    }
    
    .btn-copy:hover {
      background: #2980b9;
    }
    
    .btn-clear {
      background: #e74c3c;
      color: white;
    }
    
    .btn-clear:hover {
      background: #c0392b;
    }
    
    .empty-state {
      color: #95a5a6;
      font-style: italic;
      font-size: 14px;
    }
    
    @media (max-width: 768px) {
      .container {
        padding: 20px;
      }
      
      h1 {
        font-size: 36px;
      }
      
      .color-grid {
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Balloon Color Picker</h1>
    <p class="subtitle">Select your perfect balloon colors</p>
    
    <div class="selected-colors">
      <div class="selected-label">Selected Colors (<span id="count">0</span>)</div>
      <div class="selected-list" id="selectedList">
        <div class="empty-state">No colors selected yet. Click on colors below to add them.</div>
      </div>
    </div>
    
    <div class="color-grid" id="colorGrid"></div>
    
    <div class="actions">
      <button class="btn-copy" onclick="copySelection()">Copy Selection</button>
      <button class="btn-clear" onclick="clearSelection()">Clear All</button>
    </div>
  </div>

  <script>
    const colors = [];
    const selected = new Set();
    
    // Load colors from balloon-colors.json
    fetch('balloon-colors.json')
      .then(r => r.json())
      .then(data => {
        colors.push(...data);
        renderGrid();
      })
      .catch(err => {
        document.getElementById('colorGrid').innerHTML = 
          '<p style="color: #e74c3c; text-align: center;">Error loading colors. Make sure balloon-colors.json is in the same directory.</p>';
      });
    
    function renderGrid() {
      const grid = document.getElementById('colorGrid');
      grid.innerHTML = colors.map((color, idx) => `
        <div class="color-card" onclick="toggleColor(${idx})" id="card-${idx}">
          <img src="${color.thumbnail}" alt="${color.name}" class="color-thumbnail" 
               onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22%3E%3Crect fill=%22%23ddd%22 width=%22100%22 height=%22100%22/%3E%3C/svg%3E'">
          <div class="color-name">${color.name}</div>
        </div>
      `).join('');
    }
    
    function toggleColor(idx) {
      const color = colors[idx];
      const card = document.getElementById(`card-${idx}`);
      
      if (selected.has(idx)) {
        selected.delete(idx);
        card.classList.remove('selected');
      } else {
        selected.add(idx);
        card.classList.add('selected');
      }
      
      updateSelectedList();
    }
    
    function updateSelectedList() {
      const list = document.getElementById('selectedList');
      const count = document.getElementById('count');
      count.textContent = selected.size;
      
      if (selected.size === 0) {
        list.innerHTML = '<div class="empty-state">No colors selected yet. Click on colors below to add them.</div>';
        return;
      }
      
      const selectedColors = Array.from(selected).map(idx => colors[idx]);
      list.innerHTML = selectedColors.map((color, idx) => `
        <div class="selected-chip" onclick="toggleColor(${Array.from(selected)[idx]})">
          <span>${color.name}</span>
          <span class="remove">×</span>
        </div>
      `).join('');
    }
    
    function copySelection() {
      if (selected.size === 0) {
        alert('No colors selected!');
        return;
      }
      
      const selectedColors = Array.from(selected).map(idx => colors[idx].name);
      const text = selectedColors.join(', ');
      
      navigator.clipboard.writeText(text).then(() => {
        alert(`Copied ${selected.size} colors to clipboard!`);
      }).catch(() => {
        // Fallback for older browsers
        const textarea = document.createElement('textarea');
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        alert(`Copied ${selected.size} colors to clipboard!`);
      });
    }
    
    function clearSelection() {
      if (selected.size === 0) return;
      
      selected.forEach(idx => {
        document.getElementById(`card-${idx}`).classList.remove('selected');
      });
      selected.clear();
      updateSelectedList();
    }
  </script>
</body>
</html>
